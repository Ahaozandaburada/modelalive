name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync registry bundle
        run: |
          python scripts/merge_seeds.py
          python scripts/generate_host_seeds.py
          python scripts/merge_seeds.py
          python scripts/sync_registry.py
          cp modelalive/data/models.json js/registry.json

      - name: Verify registry sync
        run: diff -q registry/models.json modelalive/data/models.json

      - name: Install
        run: pip install -e ".[dev]"

      - name: Validate registry
        run: modelalive validate --strict

      - name: Test
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Go SDK
        run: |
          cd go && go test ./...

      - name: TypeScript SDK
        run: |
          cd js && npm ci && npm test

      - name: Registry drift gate
        run: python scripts/check_registry_drift.py

      - name: OpenAPI schema drift
        run: |
          python scripts/export_openapi.py
          git diff --exit-code openapi.json

      - name: Action version matches package
        run: |
          ACTION_VER=$(grep -A4 '  version:' action.yml | grep 'default:' | sed 's/.*"\(.*\)".*/\1/')
          python -c "from modelalive import __version__; import sys; assert __version__ == '$ACTION_VER', f'{__version__} != $ACTION_VER'"

      - name: Smoke CLI
        run: |
          modelalive check claude-sonnet-4-20250514; test $? -eq 1
          modelalive check claude-sonnet-4-6
          modelalive check gemini-2.0-flash; test $? -eq 1
          modelalive resolve claude-mythos-preview
          modelalive list --status retired --provider google | head
