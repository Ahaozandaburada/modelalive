name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync registry bundle
        run: |
          python scripts/merge_seeds.py
          python scripts/sync_registry.py

      - name: Verify registry sync
        run: diff -q registry/models.json modelalive/data/models.json

      - name: Install
        run: pip install -e ".[dev]"

      - name: Validate registry
        run: modelalive validate --strict

      - name: Test
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: TypeScript SDK
        run: |
          cd js && npm ci && npm run build && node dist/smoke.test.js

      - name: Smoke CLI
        run: |
          modelalive check claude-sonnet-4-20250514 || true
          modelalive check gemini-2.0-flash || true
          modelalive resolve claude-mythos-preview
          modelalive list --status retired --provider google | head
