# Requires modelalive.toml at repo root — see docs/ADOPTION.md
name: Model Alive — check-config

on:
  push:
    branches: [main]
  pull_request:

jobs:
  model-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install modelalive
        run: pip install "modelalive==1.5.0"

      - name: Validate pinned models
        run: modelalive check-config
