app = "modelalive"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "modelalive_data"
  destination = "/data"

[env]
  MODELALIVE_DB_PATH = "/data/modelalive.db"
  MODELALIVE_PUBLIC_URL = "https://modelalive.fly.dev"
  MODELALIVE_ENFORCE_QUOTA = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    path = "/v1/health"
