# fly.toml app configuration file generated for modelalive on 2026-06-28T21:58:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'modelalive'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/v1/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
