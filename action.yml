name: Model Alive Check
description: Fail CI if an LLM model ID is retired, deprecated, or behaviorally drifted
branding:
  icon: activity
  color: red

inputs:
  models:
    description: Space-separated model IDs to check
    required: true
  version:
    description: modelalive package version to install
    required: false
    default: "1.5.0"
  warn-deprecated:
    description: Fail when models are deprecated (not just retired)
    required: false
    default: "false"
  strict-unknown:
    description: Fail when models are not in the registry
    required: false
    default: "false"
  stable-baseline:
    description: Path to stable fingerprint JSON (behavioral drift gate; requires provider API key in env)
    required: false
    default: ""
  stable-threshold:
    description: Drift threshold for stable check (0-1)
    required: false
    default: "0.25"

runs:
  using: composite
  steps:
    - name: Install modelalive
      shell: bash
      run: pip install "modelalive[http]==${{ inputs.version }}"

    - name: Check models (lifecycle)
      shell: bash
      run: |
        set -e
        ARGS=""
        if [ "${{ inputs.warn-deprecated }}" = "true" ]; then
          ARGS="$ARGS --warn-deprecated"
        fi
        if [ "${{ inputs.strict-unknown }}" = "true" ]; then
          ARGS="$ARGS --strict-unknown"
        fi
        modelalive check $ARGS ${{ inputs.models }}

    - name: Check models (behavioral stability)
      if: inputs.stable-baseline != ''
      shell: bash
      run: |
        set -e
        for MODEL in ${{ inputs.models }}; do
          modelalive stable check "$MODEL" \
            -b "${{ inputs.stable-baseline }}" \
            --threshold "${{ inputs.stable-threshold }}"
        done
